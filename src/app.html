<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Restore the saved theme before first paint to avoid a flash of the
			// wrong color scheme. Falls back to the OS preference when unset.
			try {
				const stored = localStorage.getItem('distil-theme');
				if (stored === 'light' || stored === 'dark') {
					document.documentElement.dataset.theme = stored;
				}
			} catch (e) {
				/* storage unavailable; the OS preference applies */
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
