name: Publish image

# Build the production Docker image and publish it to the GitHub Container
# Registry (GHCR). Runs on SemVer release tags (vX.Y.Z) and on pushes to the
# default branch (master) for a rolling `latest`.
on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"

# Authenticate to GHCR with the built-in GITHUB_TOKEN: read the repo, write
# packages. No custom secret is required.
permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # QEMU registers the binfmt handlers Buildx needs to build the linux/arm64
      # leg on the amd64 runner; without it the emulated build fails.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase image name; metadata-action lowercases
      # ${{ github.repository }} for us.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      # The Dockerfile expects GIT_SHA as a build-arg because `.git` is excluded
      # from the build context (roadmap 13.5), so it cannot read the commit SHA
      # itself. Pass the short SHA so the version baked into the image is correct.
      - name: Compute short commit SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
