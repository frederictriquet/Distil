# Run Distil in production with a single command:
#
#   docker compose up --build -d
#
# Configuration is supplied via environment variables (see .env.example for the
# full reference). Copy .env.example to .env and fill in real values; Compose
# loads that .env automatically for ${VAR} interpolation below.
services:
  distil:
    build:
      context: .
      dockerfile: Dockerfile
    image: distil:latest
    restart: unless-stopped
    ports:
      # Host:container. Override the host port with APP_PORT in .env if 3000 is taken.
      - "${APP_PORT:-3000}:3000"
    environment:
      # Required secrets/config (no defaults on purpose so a misconfigured
      # deployment fails fast rather than running insecurely).
      APP_PASSWORD: ${APP_PASSWORD:?set APP_PASSWORD in your .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in your .env (>=16 chars, not a placeholder)}
      # Public origin, required by adapter-node behind a reverse proxy.
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      # Header carrying the real client IP when behind a reverse proxy (e.g.
      # x-forwarded-for). Leave empty for direct exposure.
      ADDRESS_HEADER: ${ADDRESS_HEADER:-}
      # DATABASE_PATH is fixed to the mounted volume by the image; do not override
      # it unless you also adjust the volume mount below.
    volumes:
      # Persist the SQLite database and the KB repo cache across restarts.
      - distil-data:/app/data

volumes:
  distil-data:
